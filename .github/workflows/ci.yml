name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older in-flight runs for the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests eval

      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: frontend (eslint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint .

      # `RouteContext` is a globally-injected Next.js 16 type generated
      # at `next dev` / `next build` / `next typegen` time. tsc on a fresh
      # checkout doesn't see it without this step.
      - name: Generate Next.js types
        run: npx next typegen

      - name: Typecheck (tsc)
        run: npx tsc --noEmit
